<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-3 mb-3">
        <button class="btn btn-primary me-2" onclick="sum()">Display Result</button>
        <button class="btn btn-primary me-2" onclick="Avg()">Display Result</button>

        <button class="btn btn-primary me-2" onclick="Max()">Max Number</button>

        <button class="btn btn-primary me-2" onclick="Min()">Min Number</button>

        <button class="btn btn-primary me-2" onclick="Abs()">Absolute Number</button>
        <button class="btn btn-primary me-2" onclick="Floor()">Floor Number</button>
        <button class="btn btn-primary me-2" onclick="Power()">Power</button>
    </div>

    <div class="container">
        <div class="card w-25 p-2">
            <div class="card-head">
                <input type="number" placeholder="Enter 1st number" class="form-control mb-2" id="first">
                <input type="number" placeholder="Enter 2nd number" class="form-control mb-2" id="second">
                <button class="btn btn-primary mb-2" onclick="Calculate()">Calculate</button>
            </div>
            <div class="alert alert-primary" role="alert" id="result"> </div>
            
        </div>
    </div>

    <script>
        // let a = true;
        // console.log(typeof(a));


        function sum(){
            let num1 = +prompt('Enter 1st number');
            let num2 = +prompt('Enter 2nd number');
            let sum = num1 + num2;
            // console.log(`sum of ${num1} and ${num2} : ${sum}`);
            // alert(`sum of ${num1} and ${num2} : ${sum}`);
            document.write(`sum of ${num1} and ${num2} : ${sum}`);
        }


        function Calculate(){
            let num1 = Number(document.getElementById('first').value);
            let num2 = Number(document.getElementById('second').value);
            
            let sum = num1 + num2;
            let diff = num1 - num2;
            let product = num1 * num2;
            let div = num1 / num2;
            let mod = num1 % num2;

            let result = document.getElementById('result');
            result.innerHTML = `<div class="alert alert-primary" role="alert" id="result">
                Result: <br>
                Sum = ${sum} <br>
                Product = ${product} <br>
                Difference = ${diff} <br>
                Division = ${div} <br>
                Reminder = ${mod} <br>
                </div>`
        }

        function Avg(){
            let m1 = +prompt('Enter 1st student marks: ');
            let m2 = +prompt('Enter 2nd student marks: ');
            let m3 = +prompt('Enter 3rd student marks: ');
            let avg = (m1+m2+m3) / 3;

            let roundedAvg = Math.round(avg * 100)/100;

            alert(`Average Marks: ${roundedAvg}`);
        }

        function Max(){
            let number1 = +prompt('Enter 1st number');
            let number2 = +prompt('Enter 2nd number');
            let number3 = +prompt('Enter 3rd number');

            let maxNumber = Math.max(number1,number2,number3);
            alert(`Max number is: ${maxNumber}`);
        }

        function Min(){
            let number1 = +prompt('Enter 1st number');
            let number2 = +prompt('Enter 2nd number');
            let number3 = +prompt('Enter 3rd number');

            let minNumber = Math.min(number1,number2,number3);
            alert(`Min number is: ${minNumber}`);
        }

        function Abs(){
            let n = +prompt('Enter a number');
            alert(`Absolute Value: ${Math.abs(n)}`);
        }

        function Floor(){
            let n = +prompt('Enter a number');
            alert(`Floor Value: ${Math.floor(n)}`);
        }

        function Power(){
            let number = +prompt('Enter number');
            let powerNumber = +prompt('Enter power number');
            let ans = Math.pow(number,powerNumber);
            alert(`Power of ${number}, ${powerNumber} is: ${ans}`);
        }
        
    </script>
</body>
</html>
